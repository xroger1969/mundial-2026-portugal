name: Atualizar resultados e notícias do Mundial 2026

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - results.json
      - news.json
      - openligadb-status.json
  schedule:
    - cron: "2-59/5 * * * *"

permissions:
  contents: write

concurrency:
  group: mundial-2026-updates
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Obter ficheiros do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Atualizar results.json pela football-data
        run: node scripts/update-results.js
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}

      - name: Aplicar atualização gratuita OpenLigaDB
        run: node scripts/update-openligadb.js
        continue-on-error: true

      - name: Verificar detalhes disponíveis na OpenLigaDB
        run: node scripts/check-openligadb-status.js
        continue-on-error: true

      - name: Aplicar atualização rápida Sportmonks
        run: node scripts/update-sportmonks-live.js
        continue-on-error: true
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}

      - name: Atualizar news.json
        run: node scripts/update-news.js
        continue-on-error: true
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}

      - name: Gravar atualização se houver alterações
        run: |
          if [[ -n "$(git status --porcelain results.json news.json openligadb-status.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git stash push --include-untracked results.json news.json openligadb-status.json
            git pull --rebase origin main
            git stash pop || true
            git add results.json news.json openligadb-status.json
            git commit -m "Atualizar resultados, notícias e diagnóstico OpenLigaDB" || exit 0
            git push
          else
            echo "Sem alterações em results.json, news.json ou openligadb-status.json"
          fi
