name: Atualizar resultados e notícias do Mundial 2026

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - results.json
      - news.json
  schedule:
    - cron: "2-59/5 * * * *"

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Obter ficheiros do repositório
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Atualizar results.json pela football-data
        run: node scripts/update-results.js
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}

      - name: Aplicar atualização gratuita OpenLigaDB
        run: node scripts/update-openligadb.js

      - name: Aplicar atualização rápida Sportmonks
        run: node scripts/update-sportmonks-live.js
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}

      - name: Atualizar news.json
        run: node scripts/update-news.js
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}

      - name: Gravar atualização se houver alterações
        run: |
          if [[ -n "$(git status --porcelain results.json news.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add results.json news.json
            git commit -m "Atualizar resultados e notícias automáticas"
            git push
          else
            echo "Sem alterações em results.json ou news.json"
          fi
